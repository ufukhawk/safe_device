name: Claude Code Review

on:
  # @claude ile manuel tetikleme
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]
  # PR açıldığında veya güncellendiğinde otomatik review
  pull_request:
    types: [opened, synchronize, reopened]
  # main'e push'ta otomatik review
  push:
    branches:
      - main
      - master

jobs:
  # @claude ile tetiklenen işler
  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # PR açıldığında otomatik review
  claude-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code PR Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Bu pull request'i kapsamlı şekilde incele ve şunları değerlendir:
            - Kod kalitesi ve best practices
            - Potansiyel bug'lar ve güvenlik açıkları
            - Performans sorunları
            - Eksik hata yönetimi
            Bulgularını PR yorumu olarak ekle.

  # main'e push'ta otomatik review
  claude-push-review:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run Claude Code Push Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Bu push ile gelen değişiklikleri incele:
            - Yeni eklenen kodda bug veya güvenlik açığı var mı?
            - Kod standartlarına uyuluyor mu?
            - İyileştirme önerilerin varsa belirt.
            Bulgularını özet halinde yaz.
